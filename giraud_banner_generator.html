<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Generador de Banners — Estudio Giraud</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Montserrat','Inter',sans-serif; background: #f0efe9; min-height: 100vh; padding: 2rem; color: #2c2c2c; }
.app-header { display: flex; align-items: center; gap: 1rem; margin-bottom: 2rem; }
.app-title { font-size: 1.1rem; font-weight: 700; color: #3D4F6B; }
.app-subtitle { font-size: 0.75rem; color: #888; text-transform: uppercase; letter-spacing: 0.06em; }
.panel { background: white; border-radius: 12px; padding: 1.5rem; margin-bottom: 1.5rem; border: 1px solid #e2e0d8; }
.panel-title { font-size: 0.72rem; font-weight: 700; letter-spacing: 0.09em; text-transform: uppercase; color: #3D4F6B; margin-bottom: 1rem; }
.field { display: flex; flex-direction: column; gap: 0.4rem; margin-bottom: 1rem; }
.field:last-child { margin-bottom: 0; }
.field label { font-size: 0.78rem; color: #555; font-weight: 600; }
input[type="text"], input[type="date"], input[type="password"] { border: 1px solid #d5d3cb; border-radius: 8px; padding: 0.6rem 0.8rem; font-size: 0.9rem; font-family: inherit; background: white; color: #2c2c2c; width: 100%; }
input:focus { outline: 2px solid #3D4F6B; outline-offset: 1px; border-color: transparent; }
.row { display: flex; gap: 1rem; align-items: flex-end; flex-wrap: wrap; }
.btn { padding: 0.65rem 1.6rem; border-radius: 8px; border: none; font-size: 0.88rem; font-family: inherit; font-weight: 700; cursor: pointer; letter-spacing: 0.02em; transition: all 0.15s; }
.btn-primary { background: #3D4F6B; color: white; }
.btn-primary:hover { background: #2e3d55; }
.btn-primary:disabled { background: #a0aab8; cursor: not-allowed; }
.btn-dl { background: #3D4F6B; color: white; font-size: 0.82rem; padding: 0.5rem 1rem; border-radius: 6px; border: none; cursor: pointer; font-family: inherit; font-weight: 600; }
.btn-dl:hover { background: #2e3d55; }
.tip { font-size: 0.74rem; color: #888; margin-top: 0.3rem; line-height: 1.5; }
.tip a { color: #3D4F6B; }
.status-bar { display: none; align-items: center; gap: 0.7rem; padding: 0.8rem 1rem; border-radius: 8px; font-size: 0.85rem; margin-bottom: 1rem; }
.status-bar.loading { display: flex; background: #eef2f8; color: #3D4F6B; }
.status-bar.error { display: flex; background: #fdf0f0; color: #a33; }
.spinner { width: 16px; height: 16px; border: 2px solid #3D4F6B; border-top-color: transparent; border-radius: 50%; animation: spin 0.7s linear infinite; flex-shrink: 0; }
@keyframes spin { to { transform: rotate(360deg); } }
.banners-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 1.5rem; }
.banner-card { background: white; border-radius: 12px; padding: 1rem; border: 1px solid #e2e0d8; }
.banner-card h3 { font-size: 0.78rem; font-weight: 700; color: #3D4F6B; text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 0.75rem; }
.banner-card canvas { width: 100%; border-radius: 6px; display: block; margin-bottom: 0.75rem; box-shadow: 0 2px 12px rgba(0,0,0,0.1); }
</style>
</head>
<body>

<div class="app-header">
  <img src="https://laureano-design.github.io/giraud-banners/Logo_Estudio_Giraud_01.jpg" style="height:52px;border-radius:4px" onerror="this.style.display='none'" />
  <div>
    <div class="app-title">Estudio Giraud</div>
    <div class="app-subtitle">Generador de Banners · Instagram</div>
  </div>
</div>

<div class="panel">
  <div class="panel-title">Configuración</div>
  <div class="field">
    <label>Google Sheet ID</label>
    <input type="text" id="sheet-id" value="1zZTi5YPrRPLtZV8Y6-2lPfWXlIEuU_p7jbIkJdUw3Ow" />
  </div>
  <div class="field">
    <label>API Key de Anthropic</label>
    <input type="password" id="api-key" placeholder="sk-ant-..." />
    <div class="tip">Obtenela en <a href="https://console.anthropic.com" target="_blank">console.anthropic.com</a> → API Keys</div>
  </div>
</div>

<div class="panel">
  <div class="panel-title">Generar Banners del Día</div>
  <div class="row">
    <div class="field" style="max-width:200px;margin-bottom:0">
      <label>Fecha</label>
      <input type="date" id="fecha" />
    </div>
    <button class="btn btn-primary" id="btn-generar" onclick="generarTodos()">Generar banners</button>
  </div>
</div>

<div class="status-bar" id="status">
  <div class="spinner" id="spinner"></div>
  <span id="status-text"></span>
</div>

<div id="resultado"></div>

<script>
const SHEET_COLS = {
  fecha:0,
  buenosAires:1, caba:2, catamarca:3, chaco:4, chubut:5, cordoba:6,
  corrientes:7, entreRios:8, formosa:9, jujuy:10, laPampa:11, laRioja:12,
  mendoza:13, misiones:14, neuquen:15, rioNegro:16, salta:17, sanJuan:18,
  sanLuis:19, santaCruz:20, santaFe:21, santiagoDelEstero:22, tierraDelFuego:23,
  tucuman:24,
  iva:25, ganancias:26, bienesPersonales:27, impuestosInternos:28,
  debitosCreditos:29, contabilidad:30, generalOtros:31, convenioMultilateral:32,
  laboral:33
};

const PROV_KEYS = ['buenosAires','caba','catamarca','chaco','chubut','cordoba','corrientes','entreRios','formosa','jujuy','laPampa','laRioja','mendoza','misiones','neuquen','rioNegro','salta','sanJuan','sanLuis','santaCruz','santaFe','santiagoDelEstero','tierraDelFuego','tucuman'];
const NAC_KEYS = ['iva','ganancias','bienesPersonales','impuestosInternos','debitosCreditos','contabilidad','generalOtros','convenioMultilateral','laboral'];

const LABELS = {
  buenosAires:'Buenos Aires', caba:'CABA', catamarca:'Catamarca', chaco:'Chaco',
  chubut:'Chubut', cordoba:'Córdoba', corrientes:'Corrientes', entreRios:'Entre Ríos',
  formosa:'Formosa', jujuy:'Jujuy', laPampa:'La Pampa', laRioja:'La Rioja',
  mendoza:'Mendoza', misiones:'Misiones', neuquen:'Neuquén', rioNegro:'Río Negro',
  salta:'Salta', sanJuan:'San Juan', sanLuis:'San Luis', santaCruz:'Santa Cruz',
  santaFe:'Santa Fe', santiagoDelEstero:'Santiago del Estero', tierraDelFuego:'Tierra del Fuego',
  tucuman:'Tucumán',
  iva:'IVA', ganancias:'Imp. a las Ganancias', bienesPersonales:'Bienes Personales',
  impuestosInternos:'Impuestos Internos', debitosCreditos:'Imp. Débitos y Créditos',
  contabilidad:'Normas de Contabilidad', generalOtros:'Otros Temas de Interés',
  convenioMultilateral:'Convenio Multilateral', laboral:'Laboral'
};

const NAC_SECTION_TITLE = 'NOVEDADES NACIONALES';
const PROV_SECTION_TITLE = 'NOVEDADES PROVINCIALES';

// Colors
const C_DARK = '#3D4F6B';
const C_MID = '#7A8FA6';
const C_LIGHT = '#B8C8D8';
const C_BEIGE = '#B8A99A';
const C_BG = '#F8F7F4';
const C_TEXT = '#2c2c2c';
const C_GRAY = '#555';

document.addEventListener('DOMContentLoaded', () => {
  document.getElementById('fecha').value = new Date().toISOString().slice(0,10);
  const saved = localStorage.getItem('giraud_api_key');
  if (saved) document.getElementById('api-key').value = saved;
});

function setStatus(type, msg) {
  const bar = document.getElementById('status');
  document.getElementById('status-text').textContent = msg;
  document.getElementById('spinner').style.display = type === 'loading' ? 'block' : 'none';
  bar.className = 'status-bar ' + type;
}
function hideStatus() { document.getElementById('status').className = 'status-bar'; }

async function fetchSheet(sheetId) {
  const url = `https://docs.google.com/spreadsheets/d/${sheetId}/gviz/tq?tqx=out:json&sheet=novedades_diarias`;
  const resp = await fetch(url);
  if (!resp.ok) throw new Error('No se pudo leer la planilla.');
  const text = await resp.text();
  const json = text.replace(/^[^\(]+\(/, '').replace(/\);\s*$/, '');
  const data = JSON.parse(json);
  return data.table.rows.map(row =>
    row.c.map(c => {
      if (!c || c.v === null || c.v === undefined) return '';
      if (typeof c.v === 'string' && c.v.startsWith('Date(')) {
        const m = c.v.match(/Date\((\d+),(\d+),(\d+)\)/);
        if (m) return `${m[1]}-${String(parseInt(m[2])+1).padStart(2,'0')}-${String(m[3]).padStart(2,'0')}`;
      }
      return c.f !== undefined && c.f !== null ? String(c.f) : String(c.v);
    })
  );
}

function parseFecha(str) {
  if (!str) return null;
  str = str.trim();
  if (/^\d{4}-\d{2}-\d{2}$/.test(str)) return str;
  const parts = str.replace(/"/g,'').split('/');
  if (parts.length === 3) {
    let [d,m,y] = parts;
    if (y.length === 2) y = '20'+y;
    return `${y}-${m.padStart(2,'0')}-${d.padStart(2,'0')}`;
  }
  return str.slice(0,10);
}

function findRow(rows, target) {
  for (const row of rows) {
    if (parseFecha(row[0]) === target) return row;
  }
  return null;
}

function extractData(row) {
  const provincias = [];
  const nacionales = [];
  for (const k of PROV_KEYS) {
    const v = row[SHEET_COLS[k]];
    if (v && v.trim()) provincias.push({ key: k, label: LABELS[k], texto: v.trim() });
  }
  for (const k of NAC_KEYS) {
    const v = row[SHEET_COLS[k]];
    if (v && v.trim()) nacionales.push({ key: k, label: LABELS[k], texto: v.trim() });
  }
  return { provincias, nacionales };
}

async function procesarConClaude(apiKey, tipo, label, textoCompleto, fecha) {
  const prompt = `Sos el asistente de Estudio Giraud, estudio de Contadores Públicos argentino. Analizá esta novedad legislativa y generá contenido para un banner de Instagram.

Tipo: ${tipo}
Área: ${label}
Fecha: ${fecha}
Texto completo: ${textoCompleto}

Respondé SOLO en JSON sin backticks:
{
  "titulo": "título impactante en mayúsculas (máx 6 palabras)",
  "subtitulo": "frase de contexto clara (máx 12 palabras)",
  "resumen": "resumen ejecutivo del tema en 1-2 oraciones claras para empresarios (máx 40 palabras)",
  "detalle": "desarrollo más completo del tema, qué cambia, a quién afecta, vigencia si la hay (máx 80 palabras, lenguaje claro no técnico)",
  "cta": "llamada a la acción profesional (máx 8 palabras)"
}`;

  const resp = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'x-api-key': apiKey,
      'anthropic-version': '2023-06-01',
      'anthropic-dangerous-direct-browser-access': 'true'
    },
    body: JSON.stringify({
      model: 'claude-sonnet-4-6',
      max_tokens: 800,
      messages: [{ role:'user', content: prompt }]
    })
  });

  if (!resp.ok) {
    const err = await resp.json();
    throw new Error('Error API: ' + (err.error?.message || resp.status));
  }
  const data = await resp.json();
  const text = data.content.map(b=>b.text||'').join('').trim().replace(/```json|```/g,'').trim();
  return JSON.parse(text);
}

function formatFecha(f) {
  const [y,m,d] = f.split('-');
  const meses = ['','Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
  return `${parseInt(d)} de ${meses[parseInt(m)]} de ${y}`;
}

function getLines(ctx, text, maxWidth, font) {
  ctx.font = font;
  const words = text.split(' ');
  const lines = [];
  let cur = '';
  for (const w of words) {
    const t = cur ? cur+' '+w : w;
    if (ctx.measureText(t).width > maxWidth && cur) { lines.push(cur); cur = w; }
    else cur = t;
  }
  if (cur) lines.push(cur);
  return lines;
}

function wrapText(ctx, text, x, y, maxWidth, lineH, color, font) {
  const lines = getLines(ctx, text, maxWidth, font);
  ctx.font = font; ctx.fillStyle = color;
  lines.forEach((l,i) => ctx.fillText(l, x, y + i*lineH));
  return lines.length;
}

function drawBanner(canvas, contenido, label, tipo, fechaStr, logoImg) {
  const ctx = canvas.getContext('2d');
  const W = 1080, H = 1350; // portrait for more content
  canvas.width = W; canvas.height = H;

  // BG
  ctx.fillStyle = C_BG;
  ctx.fillRect(0,0,W,H);

  // Header dark bar
  ctx.fillStyle = C_DARK;
  ctx.fillRect(0,0,W,160);

  // Footer dark bar
  ctx.fillStyle = C_DARK;
  ctx.fillRect(0, H-100, W, 100);

  // Logo in header
  if (logoImg && logoImg.complete && logoImg.naturalWidth > 0) {
    const logoH = 80;
    const logoW = logoImg.naturalWidth * (logoH / logoImg.naturalHeight);
    ctx.drawImage(logoImg, 60, 40, logoW, logoH);
  } else {
    // fallback text logo
    ctx.fillStyle = 'white';
    ctx.font = 'bold 28px Georgia,serif';
    ctx.textAlign = 'left';
    ctx.fillText('ESTUDIO GIRAUD', 70, 88);
    ctx.font = '16px "Montserrat","Inter",sans-serif';
    ctx.fillStyle = C_LIGHT;
    ctx.fillText('CONTADORES PÚBLICOS', 70, 115);
  }

  // Date top right
  ctx.fillStyle = C_LIGHT;
  ctx.font = '15px "Montserrat","Inter",sans-serif';
  ctx.textAlign = 'right';
  ctx.fillText(formatFecha(fechaStr).toUpperCase(), W-70, 95);

  // Section tag
  ctx.textAlign = 'right';
  ctx.fillStyle = C_BEIGE;
  ctx.font = '13px "Montserrat","Inter",sans-serif';
  ctx.fillText(tipo === 'provincial' ? PROV_SECTION_TITLE : NAC_SECTION_TITLE, W-70, 120);

  // Separator
  ctx.strokeStyle = C_BEIGE;
  ctx.lineWidth = 1.5;
  ctx.beginPath(); ctx.moveTo(60, 160); ctx.lineTo(W-60, 160); ctx.stroke();

  // Province/area name BIG
  ctx.textAlign = 'left';
  const labelFont = 'bold 72px Georgia,"Times New Roman",serif';
  const labelLines = getLines(ctx, label.toUpperCase(), W-120, labelFont);
  wrapText(ctx, label.toUpperCase(), 60, 250, W-120, 82, C_DARK, labelFont);
  const labelBottom = 250 + labelLines.length * 82;

  // Subtitle
  ctx.font = '24px "Montserrat","Inter",sans-serif';
  ctx.fillStyle = C_MID;
  const subLines = wrapText(ctx, contenido.subtitulo, 60, labelBottom + 20, W-120, 32, C_MID, '24px "Montserrat","Inter",sans-serif');
  const subBottom = labelBottom + 20 + subLines * 32;

  // Divider
  ctx.strokeStyle = '#D5C9BE';
  ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(60, subBottom+20); ctx.lineTo(W-60, subBottom+20); ctx.stroke();

  // RESUMEN box
  let y = subBottom + 50;
  ctx.fillStyle = '#EEF2F8';
  const resLines = getLines(ctx, contenido.resumen, W-180, '22px "Montserrat","Inter",sans-serif');
  const resBoxH = resLines.length * 30 + 40;
  ctx.beginPath();
  ctx.roundRect(60, y, W-120, resBoxH, 8);
  ctx.fill();
  ctx.fillStyle = C_DARK;
  ctx.font = 'bold 13px "Montserrat","Inter",sans-serif';
  ctx.fillText('RESUMEN', 80, y+22);
  wrapText(ctx, contenido.resumen, 80, y+44, W-160, 30, C_TEXT, '22px "Montserrat","Inter",sans-serif');
  y += resBoxH + 30;

  // DETALLE section
  ctx.fillStyle = C_DARK;
  ctx.beginPath();
  ctx.roundRect(60, y, 5, 20, 2);
  ctx.fill();
  ctx.font = 'bold 14px "Montserrat","Inter",sans-serif';
  ctx.fillStyle = C_DARK;
  ctx.fillText('DESARROLLO', 82, y+15);
  y += 35;

  const detLines = wrapText(ctx, contenido.detalle, 60, y, W-120, 30, C_GRAY, '21px "Montserrat","Inter",sans-serif');
  y += detLines * 30 + 20;

  // Thin line before titulo
  ctx.strokeStyle = '#D5C9BE';
  ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(60, y); ctx.lineTo(W-60, y); ctx.stroke();
  y += 25;

  // BIG TITLE
  const titFont = 'bold 52px Georgia,"Times New Roman",serif';
  const titLines = getLines(ctx, contenido.titulo, W-120, titFont);
  wrapText(ctx, contenido.titulo, 60, y, W-120, 62, C_DARK, titFont);

  // Footer CTA
  ctx.fillStyle = 'white';
  ctx.font = '20px "Montserrat","Inter",sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText(contenido.cta, W/2, H-38);
  ctx.textAlign = 'left';
}

let logoImg = null;

function preloadLogo() {
  return new Promise(resolve => {
    const img = new Image();
    img.crossOrigin = 'anonymous';
    img.onload = () => { logoImg = img; resolve(); };
    img.onerror = () => resolve();
    img.src = 'Logo_Estudio_Giraud_01.jpg';
  });
}

async function generarTodos() {
  const sheetId = document.getElementById('sheet-id').value.trim();
  const apiKey = document.getElementById('api-key').value.trim();
  const fecha = document.getElementById('fecha').value;

  if (!sheetId || !apiKey || !fecha) { setStatus('error','Completá todos los campos.'); return; }
  localStorage.setItem('giraud_api_key', apiKey);

  document.getElementById('btn-generar').disabled = true;
  document.getElementById('resultado').innerHTML = '';

  try {
    setStatus('loading','Cargando logo...');
    await preloadLogo();

    setStatus('loading','Leyendo la planilla...');
    const rows = await fetchSheet(sheetId);
    const row = findRow(rows, fecha);
    if (!row) { setStatus('error',`No hay datos para el ${formatFecha(fecha)}.`); return; }

    const { provincias, nacionales } = extractData(row);
    if (!provincias.length && !nacionales.length) { setStatus('error','No hay novedades para esa fecha.'); return; }

    const total = provincias.length + nacionales.length;
    const grid = document.createElement('div');
    grid.className = 'banners-grid';
    document.getElementById('resultado').appendChild(grid);

    let count = 0;

    for (const prov of provincias) {
      count++;
      setStatus('loading', `Procesando ${count} de ${total}: ${prov.label}...`);
      try {
        const contenido = await procesarConClaude(apiKey, 'provincial', prov.label, prov.texto, fecha);
        const card = document.createElement('div');
        card.className = 'banner-card';
        card.innerHTML = `<h3>${prov.label}</h3>`;
        const canvas = document.createElement('canvas');
        canvas.style.width = '100%';
        card.appendChild(canvas);
        const btnRow = document.createElement('div');
        btnRow.style.textAlign = 'right';
        const btn = document.createElement('button');
        btn.className = 'btn-dl';
        btn.textContent = '⬇ Descargar';
        btn.onclick = () => {
          const a = document.createElement('a');
          a.download = `giraud_${fecha}_${prov.key}.png`;
          a.href = canvas.toDataURL('image/png');
          a.click();
        };
        btnRow.appendChild(btn);
        card.appendChild(btnRow);
        grid.appendChild(card);
        drawBanner(canvas, contenido, prov.label, 'provincial', fecha, logoImg);
      } catch(e) {
        const card = document.createElement('div');
        card.className = 'banner-card';
        card.innerHTML = `<h3>${prov.label}</h3><p style="color:#a33;font-size:0.8rem">Error: ${e.message}</p>`;
        grid.appendChild(card);
      }
    }

    for (const nac of nacionales) {
      count++;
      setStatus('loading', `Procesando ${count} de ${total}: ${nac.label}...`);
      try {
        const contenido = await procesarConClaude(apiKey, 'nacional', nac.label, nac.texto, fecha);
        const card = document.createElement('div');
        card.className = 'banner-card';
        card.innerHTML = `<h3>${nac.label}</h3>`;
        const canvas = document.createElement('canvas');
        canvas.style.width = '100%';
        card.appendChild(canvas);
        const btnRow = document.createElement('div');
        btnRow.style.textAlign = 'right';
        const btn = document.createElement('button');
        btn.className = 'btn-dl';
        btn.textContent = '⬇ Descargar';
        btn.onclick = () => {
          const a = document.createElement('a');
          a.download = `giraud_${fecha}_${nac.key}.png`;
          a.href = canvas.toDataURL('image/png');
          a.click();
        };
        btnRow.appendChild(btn);
        card.appendChild(btnRow);
        grid.appendChild(card);
        drawBanner(canvas, contenido, nac.label, 'nacional', fecha, logoImg);
      } catch(e) {
        const card = document.createElement('div');
        card.className = 'banner-card';
        card.innerHTML = `<h3>${nac.label}</h3><p style="color:#a33;font-size:0.8rem">Error: ${e.message}</p>`;
        grid.appendChild(card);
      }
    }

    hideStatus();

  } catch(e) {
    setStatus('error', e.message);
  } finally {
    document.getElementById('btn-generar').disabled = false;
  }
}
</script>
</body>
</html>
